# Actualiza automáticamente stops-data.js y patterns-data.js todos los días a las 4:00 UTC.
# Cómo usarlo:
#   1. Sube tu proyecto (index.html, stops-data.js, patterns-data.js, gtfs_auto_update.py) a un repositorio de GitHub.
#   2. Copia este fichero a la ruta: .github/workflows/update-gtfs.yml
#   3. Ya está — GitHub Actions es gratis para repositorios públicos (y con minutos gratis de sobra
#      para repos privados en cuentas personales) para una tarea tan ligera como esta.
#   4. También puedes lanzarlo a mano desde la pestaña "Actions" de tu repo ("Run workflow").

name: Actualizar datos GTFS de TITSA

on:
  schedule:
    - cron: "0 4 * * *"   # todos los días a las 4:00 UTC
  workflow_dispatch:        # permite lanzarlo manualmente desde GitHub

jobs:
  update-gtfs:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install pandas requests

      - name: Ejecutar la actualización
        run: python3 gtfs_auto_update.py

      - name: Subir los cambios si hay datos nuevos
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add stops-data.js patterns-data.js
          git diff --quiet --cached || git commit -m "Actualización automática de datos GTFS TITSA"
          git push
